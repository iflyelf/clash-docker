# 服务
server {
    # 指定监听端口
    listen 9696;
    listen [::]:9696;
    # 域名
    server_name _;
    # 指定编码
    charset utf-8;
    # 关闭 gzip: coraza-nginx 的响应体 filter 与 gzip 在大响应体(>512KB)上存在冲突,
    # 会导致 gzip 压缩流被清空, 浏览器解压得到空内容而白屏(zashboard 的 JS 约 1.6MB)。
    # 关闭后响应不压缩, WAF 仍全程生效。
    gzip off;
    # 日志
    access_log logs/default.log combined;
    error_log logs/default.log error;
    # 路由
    location / {
             # 根目录
             root /www;
             # 站点索引设置
             index  index.html index.htm;
             # 日志
             access_log logs/xiaonuo.log combined;
             error_log logs/xiaonuo.log error;
             add_header Cache-Control "no-store, no-cache, no-transform, must-revalidate, max-age=0" always;
    }
    location ~ assets\/.*\.(?:css|js|woff2?|svg|gif|map)$ {
             root /www;
             try_files $uri $uri/ /index.html;
             add_header Cache-Control "no-store, no-cache, no-transform, must-revalidate, max-age=0" always;
    }
}
